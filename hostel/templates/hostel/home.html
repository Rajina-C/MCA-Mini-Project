{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Welcome - Hostel Allocator</title>
    
    <link href="https://bootswatch.com/5/minty/bootstrap.min.css" rel="stylesheet">
    
    <style>
        /* This CSS creates the design from your image */
        body {
            /* Uses the background image you added */
            background-image: url("{% static 'images/campus-bg.png' %}");
            background-size: cover;
            background-position: center;
            
            /* Full-screen layout */
            height: 100vh;
            width: 100vw;
            
            /* This blurs the background image */
            backdrop-filter: blur(5px);
            
            /* This centers the white box */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .welcome-card {
            background-color: white;
            padding: 2.5rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            
            /* Controls the width of the box */
            width: 100%;
            max-width: 400px;
        }
        
        .app-logo {
            width: 70px; /* "MyNest" logo */
            margin-bottom: 1rem;
        }
        
        .university-logo {
            width: 150px; /* Main university logo */
            margin-bottom: 2rem;
        }
        
        .btn-block {
            width: 100%;
            padding: 0.75rem;
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>

    <div class="welcome-card">
        
        <img src="{% static 'images/university-logo.png' %}" alt="University Logo" class="university-logo">

        <div class="d-grid gap-2">
            <a href="{% url 'login' %}" class="btn btn-primary btn-block">LOGIN</a>
            
            <a href="{% url 'register' %}" class="btn btn-outline-primary btn-block">REGISTER</a>
        </div>
        
    </div>

</body>
</html>
